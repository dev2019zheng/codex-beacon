name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-dmg:
    name: Build release DMG (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DMG
        run: pnpm --filter @codex-beacon/desktop tauri:build --target ${{ matrix.target }} --bundles dmg

      - name: Normalize asset name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          dmg="$(find ./target ./apps/desktop-tauri/src-tauri/target -path '*/bundle/dmg/*.dmg' -print -quit 2>/dev/null || true)"
          test -n "$dmg"
          cp "$dmg" "release-assets/Codex.Beacon-${{ github.ref_name }}-${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: release-dmg-${{ matrix.arch }}
          path: release-assets/*.dmg

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-macos-dmg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: release-dmg-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          prerelease_flag=()
          if [[ "$TAG_NAME" == *-* ]]; then
            prerelease_flag+=(--prerelease)
          fi

          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" \
              --verify-tag \
              --title "Codex Beacon ${TAG_NAME}" \
              --notes "See attached DMG assets to install Codex Beacon." \
              "${prerelease_flag[@]}"

          gh release upload "$TAG_NAME" release-assets/*.dmg --clobber
