name: preview

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: preview-release
  cancel-in-progress: true

jobs:
  build-macos-dmg:
    name: Build preview DMG (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DMG
        run: pnpm --filter @codex-beacon/desktop tauri:build --target ${{ matrix.target }} --bundles dmg

      - name: Normalize asset name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          dmg="$(find ./target ./apps/desktop-tauri/src-tauri/target -path '*/bundle/dmg/*.dmg' -print -quit 2>/dev/null || true)"
          test -n "$dmg"
          cp "$dmg" "release-assets/Codex.Beacon-preview-${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: preview-dmg-${{ matrix.arch }}
          path: release-assets/*.dmg

  publish-preview:
    name: Publish preview release
    runs-on: ubuntu-latest
    needs: build-macos-dmg

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: preview-dmg-*
          path: release-assets
          merge-multiple: true

      - name: Move preview tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f preview "$GITHUB_SHA"
          git push origin refs/tags/preview --force

      - name: Create or update preview release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view preview >/dev/null 2>&1 || \
            gh release create preview \
              --title "Codex Beacon Preview" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"

          gh release edit preview \
            --title "Codex Beacon Preview" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --notes "Preview build from ${GITHUB_SHA}. Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          gh release upload preview release-assets/*.dmg --clobber
